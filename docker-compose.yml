services:
  api:
    build:
      context: ./backend
    environment:
      STORAGE_DIR: /data
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      FIREWORKS_MODEL: ${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-8b-instruct}
      FIREWORKS_GEMMA_MODEL: ${FIREWORKS_GEMMA_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemma-4-31b-it:free}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      GROQ_VISION_MODEL: ${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      GROQ_TRANSCRIPTION_MODEL: ${GROQ_TRANSCRIPTION_MODEL:-whisper-large-v3}
      TRANSCRIPTION_LANGUAGE: ${TRANSCRIPTION_LANGUAGE:-en}
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-auto}
      VISUAL_PROVIDER: ${VISUAL_PROVIDER:-auto}
      MIN_VIDEO_DURATION_SECONDS: ${MIN_VIDEO_DURATION_SECONDS:-30}
      MAX_VIDEO_DURATION_SECONDS: ${MAX_VIDEO_DURATION_SECONDS:-120}
    volumes:
      - caption-lab-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  caption-lab-data:
